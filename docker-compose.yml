version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: kpos-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/tmp/entrypoint.sh
    entrypoint: ["/bin/bash", "/tmp/entrypoint.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q 'llama3.2' && ollama list | grep -q 'mxbai-embed-large'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kpos-web
    ports:
      - "3000:3000"
    environment:
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - kpos_progress:/root/.kpos
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
  kpos_progress:
