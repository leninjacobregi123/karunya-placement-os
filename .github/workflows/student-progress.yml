name: Student Progress Validation

on:
  push:
    branches: [master]
    paths:
      - "progress/**"
      - "scripts/**"
      - "engine/**"
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run self-check
        run: python scripts/kpos.py self-check

      - name: Validate progress files
        run: python scripts/kpos.py validate-progress || true
